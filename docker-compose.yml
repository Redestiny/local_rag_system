services:
  app:
    build:
      context: .
      args:
        NEXT_PUBLIC_API_URL: /
    ports:
      - "10113:10113"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      OLLAMA_BASE_URL: http://host.docker.internal:11434/v1
      NEXT_PUBLIC_API_URL: /
    volumes:
      - ./Data:/app/Data
